<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Falha no Pagamento - Agenda Rosa</title>
    <style>
      body { 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        background: #f8f2f5; 
        color: #2c2428; 
        padding: 24px; 
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .card { 
        max-width: 450px; 
        width: 100%;
        background: #fff; 
        border: 1px solid #ead7e1; 
        border-radius: 16px; 
        padding: 40px 30px; 
        text-align: center;
        box-shadow: 0 10px 25px rgba(201, 63, 125, 0.05);
      }
      .icone-falha {
        width: 80px;
        height: 80px;
        background: #ffebee;
        color: #f44336;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        margin: 0 auto 20px;
      }
      h1 { color: #f44336; font-size: 24px; margin-top: 0; margin-bottom: 10px; }
      p { color: #666; font-size: 16px; line-height: 1.5; margin-bottom: 30px; }
      .acoes { display: flex; flex-direction: column; gap: 12px; }
      .btn-principal {
        background: linear-gradient(135deg, #c93f7d 0%, #a83266 100%);
        color: white;
        padding: 14px 24px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .btn-principal:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(201, 63, 125, 0.2); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icone-falha">✕</div>
      <h1>Ops, algo deu errado</h1>
      <p>Infelizmente não foi possível processar o seu pagamento neste momento.<br>Por favor, tente novamente.</p>
      
      <div class="acoes">
        <a href="/html/homeDoCliente.html" class="btn-principal">Tentar Novamente na Home</a>
      </div>
    </div>
  </body>
</html>
