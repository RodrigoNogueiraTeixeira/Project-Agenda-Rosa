<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagamento Aprovado - Agenda Rosa</title>
    <style>
      body { 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        background: #f8f2f5; 
        color: #2c2428; 
        padding: 24px; 
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .card { 
        max-width: 450px; 
        width: 100%;
        background: #fff; 
        border: 1px solid #ead7e1; 
        border-radius: 16px; 
        padding: 40px 30px; 
        text-align: center;
        box-shadow: 0 10px 25px rgba(201, 63, 125, 0.05);
      }
      .icone-sucesso {
        width: 80px;
        height: 80px;
        background: #e8f5e9;
        color: #4caf50;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        margin: 0 auto 20px;
      }
      h1 { color: #c93f7d; font-size: 24px; margin-top: 0; margin-bottom: 10px; }
      p { color: #666; font-size: 16px; line-height: 1.5; margin-bottom: 30px; }
      .acoes { display: flex; flex-direction: column; gap: 12px; }
      .btn-principal {
        background: linear-gradient(135deg, #c93f7d 0%, #a83266 100%);
        color: white;
        padding: 14px 24px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .btn-principal:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(201, 63, 125, 0.2); }
      .btn-secundario {
        background: #f5eef1;
        color: #c93f7d;
        padding: 14px 24px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: background 0.2s;
      }
      .btn-secundario:hover { background: #ead7e1; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icone-sucesso">✓</div>
      <h1>Tudo Certo!</h1>
      <p>Recebemos o seu pagamento com sucesso. O seu horário já está garantido!<br><br>Você pode acompanhar todos os detalhes e o status do seu serviço na sua tela de agendamentos.</p>
      
      <div class="acoes">
        <a href="/cliente/html/AgendamentoCliente.html" class="btn-principal">Acompanhar Meus Agendamentos</a>
        <a href="/cliente/html/homeDoCliente.html" class="btn-secundario">Voltar para o Início</a>
      </div>
    </div>
  </body>
</html>
