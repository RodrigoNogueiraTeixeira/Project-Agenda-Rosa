<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovação de Cadastros</title>
    <link rel="stylesheet" href="../css/EstilosDashboardAprovacao.css">
</head>

<body>

    <div class="PrimeiroBlocoDeDados">
        <div class="TextosPrimeiroBloco">
            <header>
                <h1>Aprovação de cadastros</h1>
                <p>Gestão de cadastros de empresas/profissionais para aprovação.</p>
            </header>

        </div>

        <div class="AncoraPrimeiroBloco">
            <a href="./Dashboard.html">Voltar</a>
        </div>
    </div>

    <div class="SegundoBlocoDeDados">
        <h1>Filtros</h1>

        <div class="BlocoDeFiltros1">
            <p>Status</p>
            <select name="SeletorStatus" id="SeletorStatus">
                <option value="Todos">Todos</option>
                <option value="Pendente">Pendente</option>
                <option value="Aprovado">Aprovado</option>
                <option value="Reprovado">Reprovado</option>
            </select>
            <button class="BtnFiltrar">Filtrar</button>
        </div>

        <div class="BlocoDeFiltros2">
            <p>Nome do estabelecimento/profissional</p>
            <input type="text" id="FiltroNome">
        </div>

        <div class="BlocoDeFiltros3">
            <p>Data de cadastro</p>
            <input type="date" id="FiltroData">
        </div>
    </div>

    <div class="TerceiroBlocoDeDados">
        <h3>Cadastros</h3>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Responsáveis</th>
                    <th>Cidade/Bairros</th>
                    <th>Data de cadastros</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-aprovacao">
                <!-- Linhas geradas dinamicamente -->
            </tbody>
        </table>
    </div>

    <!-- Modal de Detalhes da Empresa -->
    <div id="modalDetalhes" class="modal-custom" style="display: none;">
        <div class="modal-custom-content">
            <div class="modal-custom-header">
                <h2>Detalhes do Estabelecimento</h2>
                <button type="button" class="close-modal-btn" onclick="fecharModal()">&times;</button>
            </div>
            <div class="modal-custom-body" id="detalhes-empresa-conteudo">
                <!-- Injetado via JS -->
            </div>
        </div>
    </div>

    <script src="../js/DashboardAprovacao.js"></script>
</body>

</html>
