<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci Minha Senha</title>
    <link rel="shortcut icon" href="assets/Logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="EstiloEsqueciMinhaSenha.css">
</head>
<body>

    <main>
   
    <H1>Esqueci Minha Senha</H1>
    <h2 style="color: dimgray;">Informe seus dados para recuperar o acesso</h2>

    <br>
    <br>
    <br>
    <p>Perfil de Acesso</p> 
    <select id="perfil-recuperacao" name="perfil-recuperacao"
    required>
    <option value=>Selecione o perfil</option>
    <option value="Cliente">Cliente</option>
    <option value="Empresa">Empresa</option>
    <option value="Administrador">Administrador</option>
    </select>
    <div class="CamposObrigatorios">
        <p><br>
            Campos obrigatórios: Perfil de acesso e E-mail ou usuário.<br>
            Para administrador, use credenciais internas para recuperação.
            <br>
            <br>
        </p>
    </div>

    <br>
    <br>
    <div class="EmailResetSenha">
    <p>E-mail ou usuário</p>
    <br>
        <input type="email" id="email-recuperacao" placeholder="admin@agendarosa.com.br">
    
    </div>
    
    <h3><button type="button" id="btn-recuperar-senha">Enviar link de recuperação </button></h3> 
<br>
<a class="VoltarLogin" href="TelaInicial">Voltar para login</a>
</main>


<script src="EsqueciMinhaSenha.js"></script>
</body>
</html>
