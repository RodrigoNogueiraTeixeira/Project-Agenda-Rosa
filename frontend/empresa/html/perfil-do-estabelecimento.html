<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Rosa | Perfil do Estabelecimento</title>
    <link rel="stylesheet" href="../css/perfil-do-estabelecimento.css">
</head>

<body>

    <main class="container">

        <!-- Cabecalho da tela de perfil -->
        <header class="topo">
            <div>
                <h1>Perfil do estabelecimento</h1>
                <p>Cadastro e edição dos dados do estabelecimento.</p>
            </div>
            <a class="btn-voltar" href="home-empresa.html">
                Voltar
            </a>
        </header>

        <!-- Formulario com dados do estabelecimento -->
        <form id="form-perfil-estabelecimento">

            <!-- DADOS PRINCIPAIS -->
            <section class="card">
                <h2>Dados principais</h2>

                <div class="campo">
                    <label for="foto-logo">Foto/Logo</label>
                    <div class="logo-perfil">
                        <img id="preview-logo" alt="Logo do estabelecimento">
                        <input
                            type="file"
                            id="foto-logo"
                            accept="image/png,image/jpeg,image/webp"
                        >
                    </div>
                    <small>Formatos aceitos: PNG, JPG ou WEBP. Tamanho maximo: 1 MB.</small>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label for="nome-estabelecimento">
                            Nome do estabelecimento
                        </label>
                        <input type="text" id="nome-estabelecimento" required>
                    </div>

                    <div class="campo">
                        <label for="categoria-principal">
                            Categoria principal
                        </label>
                        <select id="categoria-principal" required>
                            <option value="">Selecione uma categoria</option>
                        </select>
                    </div>
                </div>

                <div class="campo">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao"></textarea>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" maxlength="15" required>
                    </div>

                    <div class="campo">
                        <label for="email">E-mail de contato</label>
                        <input type="email" id="email" required>
                    </div>
                </div>
            </section>

            <!-- ENDEREÇO -->
            <section class="card">
                <h2>Endereço</h2>

                <div class="linha">
                    <div class="campo">
                        <label for="cep">CEP</label>
                        <input 
                            type="text"
                            id="cep"
                            pattern="\d{5}-?\d{3}"
                            title="O CEP deve ter 8 números"
                            required
                        >
                    </div>

                    <div class="campo">
                        <label for="endereco">Endereço</label>
                        <input type="text" id="endereco" required>
                    </div>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label for="numero">Número</label>
                        <input type="text" id="numero">
                    </div>

                    <div class="campo">
                        <label for="complemento">Complemento</label>
                        <input type="text" id="complemento">
                    </div>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" required>
                    </div>

                    <div class="campo">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" required>
                    </div>
                </div>

                <div class="botoes">
                    <button class="btn-salvar" type="submit">
                        Salvar
                    </button>
                </div>

            </section>

        </form>

    </main>

    <script src="../js/perfil-do-estabelecimento.js"></script>
</body>
</html>
