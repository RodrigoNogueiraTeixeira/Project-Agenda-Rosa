<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Rosa | Horário de Funcionamento</title>
    <link rel="stylesheet" href="../css/horario-de-funcionamento.css">
</head>
<body>

    <main class="container">
        <!-- Cabecalho da tela de horarios -->
        <header class="page-header">
            <div>
                <h1>Horário de funcionamento</h1>
                <p>Configuração da disponibilidade por dia da semana.</p>
            </div>
            <div class="back-button">
                <a href="home-empresa.html">Voltar</a>
            </div>
        </header>

        <!-- Tabela com os horarios de cada dia da semana -->
        <section class="card">
            <h2>Horários por dia da semana</h2>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Dia da semana</th>
                            <th>Abre?</th>
                            <th>Horário de abertura</th>
                            <th>Horário de fechamento</th>
                            <th>Intervalo início</th>
                            <th>Intervalo fim</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr data-dia-semana="1">
                            <td>Segunda-feira</td>
                            <td>
                                <select class="js-abre" name="segunda-abre">
                                    <option value="sim">Sim</option>
                                    <option value="nao">Não</option>
                                </select>
                            </td>
                            <td><input class="js-abertura" type="time" name="segunda-abertura"></td>
                            <td><input class="js-fechamento" type="time" name="segunda-fechamento"></td>
                            <td><input class="js-intervalo-inicio" type="time" name="segunda-intervalo-inicio"></td>
                            <td><input class="js-intervalo-fim" type="time" name="segunda-intervalo-fim"></td>
                        </tr>

                        <tr data-dia-semana="2">
                            <td>Terça-feira</td>
                            <td>
                                <select class="js-abre" name="terca-abre">
                                    <option value="sim">Sim</option>
                                    <option value="nao">Não</option>
                                </select>
                            </td>
                            <td><input class="js-abertura" type="time" name="terca-abertura"></td>
                            <td><input class="js-fechamento" type="time" name="terca-fechamento"></td>
                            <td><input class="js-intervalo-inicio" type="time" name="terca-intervalo-inicio"></td>
                            <td><input class="js-intervalo-fim" type="time" name="terca-intervalo-fim"></td>
                        </tr>

                        <tr data-dia-semana="3">
                            <td>Quarta-feira</td>
                            <td>
                                <select class="js-abre" name="quarta-abre">
                                    <option value="sim">Sim</option>
                                    <option value="nao">Não</option>
                                </select>
                            </td>
                            <td><input class="js-abertura" type="time" name="quarta-abertura"></td>
                            <td><input class="js-fechamento" type="time" name="quarta-fechamento"></td>
                            <td><input class="js-intervalo-inicio" type="time" name="quarta-intervalo-inicio"></td>
                            <td><input class="js-intervalo-fim" type="time" name="quarta-intervalo-fim"></td>
                        </tr>

                        <tr data-dia-semana="4">
                            <td>Quinta-feira</td>
                            <td>
                                <select class="js-abre" name="quinta-abre">
                                    <option value="sim">Sim</option>
                                    <option value="nao">Não</option>
                                </select>
                            </td>
                            <td><input class="js-abertura" type="time" name="quinta-abertura"></td>
                            <td><input class="js-fechamento" type="time" name="quinta-fechamento"></td>
                            <td><input class="js-intervalo-inicio" type="time" name="quinta-intervalo-inicio"></td>
                            <td><input class="js-intervalo-fim" type="time" name="quinta-intervalo-fim"></td>
                        </tr>

                        <tr data-dia-semana="5">
                            <td>Sexta-feira</td>
                            <td>
                                <select class="js-abre" name="sexta-abre">
                                    <option value="sim">Sim</option>
                                    <option value="nao">Não</option>
                                </select>
                            </td>
                            <td><input class="js-abertura" type="time" name="sexta-abertura"></td>
                            <td><input class="js-fechamento" type="time" name="sexta-fechamento"></td>
                            <td><input class="js-intervalo-inicio" type="time" name="sexta-intervalo-inicio"></td>
                            <td><input class="js-intervalo-fim" type="time" name="sexta-intervalo-fim"></td>
                        </tr>

                        <tr data-dia-semana="6">
                            <td>Sábado</td>
                            <td>
                                <select class="js-abre" name="sabado-abre">
                                    <option value="sim">Sim</option>
                                    <option value="nao">Não</option>
                                </select>
                            </td>
                            <td><input class="js-abertura" type="time" name="sabado-abertura"></td>
                            <td><input class="js-fechamento" type="time" name="sabado-fechamento"></td>
                            <td><input class="js-intervalo-inicio" type="time" name="sabado-intervalo-inicio"></td>
                            <td><input class="js-intervalo-fim" type="time" name="sabado-intervalo-fim"></td>
                        </tr>

                        <tr data-dia-semana="0">
                            <td>Domingo</td>
                            <td>
                                <select class="js-abre" name="domingo-abre">
                                    <option value="sim">Sim</option>
                                    <option value="nao">Não</option>
                                </select>
                            </td>
                            <td><input class="js-abertura" type="time" name="domingo-abertura"></td>
                            <td><input class="js-fechamento" type="time" name="domingo-fechamento"></td>
                            <td><input class="js-intervalo-inicio" type="time" name="domingo-intervalo-inicio"></td>
                            <td><input class="js-intervalo-fim" type="time" name="domingo-intervalo-fim"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="actions">
                <button type="button" data-salvar-horarios>Salvar horários</button>
            </div>
        </section>

    </main>

    <script src="../js/horario-funcionamento.js"></script>
</body>
</html>
