<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenda Rosa | Cadastro Empresa</title>
    <link rel="stylesheet" href="../css/base-cadastro.css" />
  </head>
  <body>
    <main class="container">
      <div class="card">
        <header>
          <h1>Cadastre seu negocio</h1>
          <p>Preencha os dados para criar a sua conta</p>
        </header>

        <form id="form-cadastro-empresa">
          <section>
            <label for="nome-completo-profissional">Nome completo</label>
            <input
              type="text"
              id="nome-completo-profissional"
              placeholder="Digite o seu nome completo"
              required
            />
            <br />

            <label for="telefone-empresa">Telefone</label>
            <input
              type="tel"
              id="telefone-empresa"
              placeholder="(00) 00000-0000"
              maxlength="15"
              required
            />

            <label for="email-empresa">E-mail</label>
            <input
              type="email"
              id="email-empresa"
              placeholder="seuemail@dominio.com"
              required
            />
            <br />

            <label for="nome-estabelecimento">Nome do negocio</label>
            <input
              type="text"
              id="nome-estabelecimento"
              placeholder="Digite o nome do estabelecimento"
              required
            />

            <label for="senha-empresa">Senha</label>
            <input
              type="password"
              id="senha-empresa"
              placeholder="Crie sua senha"
              minlength="6"
              required
            />
            <br />

            <label for="confirmar-senha-empresa">Confirmar senha</label>
            <input
              type="password"
              id="confirmar-senha-empresa"
              placeholder="Confirme a senha escolhida"
              minlength="6"
              required
            />
          </section>

          <button type="submit">Cadastrar</button>
        </form>

        <div class="login-link">
          <span>Ja possui conta?</span>
          <a href="../../login/html/login.html">Faca login</a>
        </div>
      </div>
    </main>
    <script src="../js/cadastro-empresa.js"></script>
  </body>
</html>
