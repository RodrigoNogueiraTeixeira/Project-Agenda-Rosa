<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Agenda Rosa | Serviços</title>

    <link rel="stylesheet" href="../css/servicos-empresa.css" />
  </head>

  <body>
    <main class="container">
      <!-- HEADER -->
      <header class="card page-header">
        <div>
          <h1>Serviços</h1>

          <p>Cadastro e gerenciamento dos serviços oferecidos.</p>
        </div>
      </header>

      <!-- FORMULÁRIO -->
      <section class="card">
        <h2>Cadastro de Serviço</h2>

        <form class="form-grid" id="form-servico">
          <!-- NOME -->
          <div class="form-group">
            <label for="nome-servico"> Nome do serviço </label>

            <input type="text" id="nome-servico" />
          </div>

          <!-- CATEGORIA -->
          <div class="form-group">
            <label for="categoria-servico"> Categoria do serviço </label>

            <input type="text" id="categoria-servico" />
          </div>

          <!-- PREÇO -->
          <div class="form-group">
            <label for="preco-servico"> Preço </label>

            <input type="text" id="preco-servico" />
          </div>

          <!-- DURAÇÃO -->
          <div class="form-group">
            <label for="duracao-servico"> Duração </label>

            <input type="text" id="duracao-servico" />
          </div>

          <!-- DESCRIÇÃO -->
          <div class="form-group full-width">
            <label for="descricao-servico"> Descrição </label>

            <textarea id="descricao-servico"></textarea>
          </div>

          <!-- STATUS -->
          <div class="form-group">
            <label for="status-servico"> Status </label>

            <select id="status-servico">
              <option value="ativo">Ativo</option>

              <option value="inativo">Inativo</option>
            </select>
          </div>

          <!-- BOTÃO -->
          <div class="button-area">
            <button type="submit">Cadastrar serviço</button>
          </div>
        </form>
      </section>

      <!-- TABELA -->
      <section class="card">
        <div class="table-header">
          <h2>Serviços cadastrados</h2>
        </div>

        <table>
          <thead>
            <tr>
              <th>Serviço</th>
              <th>Categoria</th>
              <th>Preço</th>
              <th>Duração</th>
              <th>Descrição</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>Corte feminino</td>

              <td>Cabelo</td>

              <td>R$ 60,00</td>

              <td>50 min</td>

              <td>Com finalização</td>

              <td>Ativo</td>

              <td class="acoes">
                <button class="btn-outline">Editar</button>

                <button class="btn-outline">Excluir</button>
              </td>
            </tr>
          </tbody>
        </table>
      </section>

      <!-- VOLTAR -->
      <div>
        <a class="btn-voltar" href="home-empresa.html">Voltar</a>
      </div>
    </main>
    <script src="../js/servicos-empresa.js"></script>
  </body>
</html>
