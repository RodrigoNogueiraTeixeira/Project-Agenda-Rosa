<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Agenda Rosa | Profissionais</title>

    <link rel="stylesheet" href="../css/profissionais-empresa.css" />
  </head>

  <body>
    <main class="container">
      <!-- CABEÇALHO DA PÁGINA -->
      <header class="card page-header">
        <div>
          <h1>Profissionais</h1>
          <p>Cadastro e gerenciamento da equipe do estabelecimento.</p>
        </div>
      </header>

      <!-- FORMULÁRIO DE CADASTRO DO PROFISSIONAL -->
      <section class="card">
        <h2>Cadastro de profissional</h2>

        <form class="form-grid" id="form-profissional">
          <!-- NOME DO PROFISSIONAL -->
          <div class="form-group">
            <label for="nome-profissional">Nome completo</label>
            <input type="text" id="nome-profissional" placeholder="Digite o nome do profissional" />
          </div>

          <!-- TELEFONE DO PROFISSIONAL -->
          <div class="form-group">
            <label for="telefone-profissional">Telefone</label>
            <input type="tel" id="telefone-profissional" placeholder="(00) 00000-0000" maxlength="15" />
          </div>

          <!-- E-MAIL DO PROFISSIONAL -->
          <div class="form-group">
            <label for="email-profissional">E-mail</label>
            <input type="email" id="email-profissional" placeholder="profissional@dominio.com" />
          </div>

          <!-- ESPECIALIDADE OU FUNÇÃO -->
          <div class="form-group">
            <label for="especialidade-profissional">Especialidade/Função</label>
            <input
              type="text"
              id="especialidade-profissional"
              placeholder="Ex.: Cabeleireira, manicure, esteticista"
            />
          </div>

          <!-- STATUS DO PROFISSIONAL -->
          <div class="form-group">
            <label for="status-profissional">Status</label>
            <select id="status-profissional">
              <option value="ativo">Ativo</option>
              <option value="inativo">Inativo</option>
            </select>
          </div>

          <!-- BOTÃO DE ENVIO DO FORMULÁRIO -->
          <div class="button-area">
            <button type="submit">Cadastrar profissional</button>
          </div>
        </form>
      </section>

      <!-- TABELA DE PROFISSIONAIS CADASTRADOS -->
      <section class="card">
        <div class="table-header">
          <h2>Profissionais cadastrados</h2>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>E-mail</th>
                <th>Especialidade/Função</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>

            <tbody>
              <tr>
                <td colspan="6">Nenhum profissional cadastrado.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- BOTÃO PARA RETORNAR AO PAINEL DA EMPRESA -->
      <div>
        <a class="btn-voltar" href="home-empresa.html">Voltar</a>
      </div>
    </main>
    <script src="../js/profissionais-empresa.js"></script>
  </body>
</html>
