<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenda Rosa | Profissionais</title>
    <link rel="stylesheet" href="../css/profissionais-empresa.css" />
  </head>

  <body>
    <main class="container">
      <!-- Cabecalho da tela de profissionais -->
      <header class="card page-header">
        <div>
          <h1>Profissionais</h1>
          <p>Cadastro e gerenciamento da equipe do estabelecimento.</p>
        </div>
        <a class="btn-voltar" href="home-empresa.html">Voltar</a>
      </header>

      <!-- Formulario de cadastro e edicao de profissionais -->
      <section class="card">
        <h2>Cadastro de profissional</h2>

        <form class="form-grid" id="form-profissional">
          <div class="form-group">
            <label for="nome-profissional">Nome completo</label>
            <input
              type="text"
              id="nome-profissional"
              placeholder="Digite o nome do profissional"
            />
          </div>

          <div class="form-group">
            <label for="telefone-profissional">Telefone</label>
            <input
              type="tel"
              id="telefone-profissional"
              placeholder="(00) 00000-0000"
              maxlength="15"
            />
          </div>

          <div class="form-group">
            <label for="email-profissional">E-mail</label>
            <input
              type="email"
              id="email-profissional"
              placeholder="profissional@dominio.com"
            />
          </div>

          <div class="form-group">
            <label for="status-profissional">Status</label>
            <select id="status-profissional">
              <option value="ativo">Ativo</option>
              <option value="inativo">Inativo</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label>Serviços atendidos</label>
            <div class="lista-servicos" id="servicos-profissional">
              <p>Carregando serviços...</p>
            </div>
          </div>

          <div class="button-area">
            <button type="submit">Cadastrar profissional</button>
          </div>
        </form>
      </section>

      <!-- Tabela com os profissionais cadastrados -->
      <section class="card">
        <div class="table-header">
          <h2>Profissionais cadastrados</h2>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>E-mail</th>
                <th>Serviços atendidos</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>

            <tbody>
              <tr>
                <td colspan="6">Nenhum profissional cadastrado.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

    </main>

    <script src="../js/profissionais-empresa.js"></script>
  </body>
</html>
