<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenda Rosa | Cadastro de Cliente</title>
    <link rel="stylesheet" href="../css/base-cadastro.css" />
  </head>
  <body>
    <main class="container">
      <div class="card">
        <header>
          <h1>Venha fazer parte</h1>
          <p>Preencha os dados para criar a sua conta</p>
        </header>

        <form>
          <section>
            <label for="perfil-cadastro">Deseja cadastrar-se como:</label>
            <select id="perfil-cadastro">
              <option value="cliente">Cliente (Agendar horários)</option>
              <option value="empresa">Empresa / Profissional (Oferecer serviços)</option>
            </select>
            <br /><br />
            
            <label for="nome-completo">Nome completo</label>
            <input
              type="text"
              id="nome-completo"
              placeholder="Digite o seu nome completo"
            />
            <br />
            <label for="email-cliente">E-mail</label>
            <input
              type="email"
              id="email-cliente"
              placeholder="seuemail@dominio.com"
            />
            <br />
            <label for="telefone-cliente">Telefone</label>
            <input
              type="tel"
              id="telefone-cliente"
              placeholder="(00) 00000-0000"
            />
            <div id="container-estabelecimento" style="display: none;">
              <br />
              <label for="nome-estabelecimento">Nome do Negócio</label>
              <input
                type="text"
                id="nome-estabelecimento"
                placeholder="Digite o nome do estabelecimento"
              />
            </div>
            <br />
            <label for="senha-cliente">Senha</label>
            <input
              type="password"
              id="senha-cliente"
              placeholder="Crie sua senha"
            />
            <br />
            <label for="confirmar-senha-cliente">Confirmar senha</label>
            <input
              type="password"
              id="confirmar-senha-cliente"
              placeholder="Confirme a senha escolhida"
            />
          </section>

          <button type="submit">Cadastrar</button>
        </form>

        <div class="login-link">
          <span>Já possui conta?</span>
          <a href="./login.html">Faça login</a>
        </div>
      </div>
    </main>
    <script src="../js/cadastro-cliente.js"></script>
  </body>
</html>
